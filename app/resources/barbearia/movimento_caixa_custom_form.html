<!--[main]-->
<style>
    :root {
        --bb-bg: #ffffff;
        --bb-surface: #ffffff;
        --bb-ink: #121212;
        --bb-muted: #6E6E6E;
        --bb-border: rgba(18, 18, 18, 0.12);
        --bb-primary: #4A2C2A;
        --bb-primary-2: #121212;
        --bb-shadow: 0 18px 40px rgba(18, 18, 18, 0.18);
        --bb-radius: 18px;
    }

    .bb-page {
        padding: 18px;
        background: radial-gradient(circle at 12% 10%, #ffffff 0%, #f7f7f7 70%, rgba(18, 18, 18, 0.04) 100%);
        color: var(--bb-ink);
        font-family: 'Source Sans Pro', 'Segoe UI', sans-serif;
    }

    .bb-topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 18px;
        flex-wrap: wrap;
    }

    .bb-title {
        margin: 0;
        font-weight: 900;
        font-size: clamp(1.6rem, 1.2rem + 1.1vw, 2.2rem);
        letter-spacing: 0.3px;
    }

    .bb-sub {
        color: var(--bb-muted);
        margin-top: 8px;
        max-width: 700px;
    }

    .bb-card {
        background: var(--bb-surface);
        border-radius: var(--bb-radius);
        border: 1px solid var(--bb-border);
        box-shadow: var(--bb-shadow);
        padding: 16px;
    }

    .bb-form {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 14px;
    }

    .bb-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    .bb-label {
        font-size: 0.88rem;
        font-weight: 700;
        color: var(--bb-muted);
    }

    .bb-input {
        border-radius: 14px !important;
        height: 46px;
        border: 1px solid rgba(31, 41, 55, 0.18) !important;
        padding: 0 12px;
    }

    .bb-input:focus {
        border-color: rgba(74, 44, 42, 0.6) !important;
        box-shadow: 0 0 0 0.2rem rgba(74, 44, 42, 0.18) !important;
    }

    .bb-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        flex-wrap: wrap;
    }

    .bb-btn {
        height: 46px;
        border-radius: 999px !important;
        font-weight: 800;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 8px 18px rgba(31, 41, 55, 0.12);
    }

    .bb-btn-primary {
        background: linear-gradient(135deg, var(--bb-primary) 0%, var(--bb-primary-2) 100%) !important;
        border: 0 !important;
        color: #fff !important;
    }

    .bb-btn-outline {
        background: #fff !important;
        border: 1px solid rgba(31, 41, 55, 0.18) !important;
    }

    .bb-table-wrap {
        margin-top: 16px;
        border-radius: 16px;
        border: 1px solid rgba(31, 41, 55, 0.12);
        overflow: hidden;
    }

    .bb-table-toolbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 16px;
    }

    .bb-filter {
        display: flex;
        align-items: flex-end;
        gap: 10px;
        flex-wrap: wrap;
    }

    .bb-filter .bb-field {
        min-width: 180px;
    }

    .bb-pagination {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .bb-page-btn {
        height: 38px;
        border-radius: 999px !important;
        padding: 0 14px;
        font-weight: 700;
        border: 1px solid rgba(31, 41, 55, 0.18) !important;
        background: #fff !important;
    }

    .bb-page-info {
        font-size: 0.9rem;
        color: var(--bb-muted);
        font-weight: 700;
    }

    .bb-table thead th {
        background: rgba(201, 162, 77, 0.18);
        font-weight: 800;
        color: #1f2937;
    }

    .bb-badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.2px;
    }

    .bb-badge-in {
        background: rgba(6, 95, 70, 0.12);
        color: #065f46;
        border: 1px solid rgba(6, 95, 70, 0.25);
    }

    .bb-badge-out {
        background: rgba(153, 27, 27, 0.12);
        color: #991b1b;
        border: 1px solid rgba(153, 27, 27, 0.25);
    }

    @media (max-width: 767.98px) {
        .bb-page { padding: 12px; }
        .bb-form { grid-template-columns: repeat(1, 1fr); }
        .bb-field { grid-column: 1 / -1 !important; }
        .bb-actions { justify-content: stretch; }
        .bb-btn { width: 100%; justify-content: center; }
        .bb-table-toolbar { align-items: stretch; }
        .bb-filter { width: 100%; }
        .bb-pagination { width: 100%; justify-content: space-between; }
        .bb-page-btn { flex: 1; }
    }

    [data-bs-theme="dark"] .bb-page {
        background: radial-gradient(circle at 12% 18%, #1a1a1a 0%, #121212 55%, #0b0b0b 100%);
        color: #E6DCCB;
    }

    [data-bs-theme="dark"] .bb-card {
        background: #121212;
        border-color: rgba(201, 162, 77, 0.25);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
    }

    [data-bs-theme="dark"] .bb-input,
    [data-bs-theme="dark"] .bb-table-wrap {
        background: #1a1a1a;
        border-color: rgba(201, 162, 77, 0.25) !important;
        color: #E6DCCB;
    }

    [data-bs-theme="dark"] .bb-label,
    [data-bs-theme="dark"] .bb-sub {
        color: #6E6E6E;
    }

    [data-bs-theme="dark"] .bb-btn-outline,
    [data-bs-theme="dark"] .bb-page-btn {
        background: #121212 !important;
        color: #E6DCCB !important;
        border-color: rgba(201, 162, 77, 0.35) !important;
    }
    [data-bs-theme="dark"] .bb-page-btn:disabled { opacity: 0.6; }
    [data-bs-theme="dark"] .bb-table thead th {
        background: rgba(201, 162, 77, 0.2);
        color: #E6DCCB;
    }

    [data-bs-theme="dark"] .bb-badge-in {
        background: rgba(34, 197, 94, 0.18);
        color: #86efac;
        border-color: rgba(34, 197, 94, 0.35);
    }

    [data-bs-theme="dark"] .bb-badge-out {
        background: rgba(239, 68, 68, 0.2);
        color: #fecaca;
        border-color: rgba(239, 68, 68, 0.35);
    }
</style>

<div class="bb-page">
    <div class="bb-topbar">
        <div>
            <h1 class="bb-title">{$page_title}</h1>
            <div class="bb-sub">{$page_subtitle}</div>
        </div>
    </div>

    <div class="bb-card">
        <input type="hidden" id="bb-id" value="">
        <div class="bb-form">
            <div class="bb-field" style="grid-column: span 4;">
                <label class="bb-label">{$label_data}</label>
                <input id="bb-data" type="datetime-local" class="form-control bb-input">
            </div>
            <div class="bb-field" style="grid-column: span 3;">
                <label class="bb-label">{$label_tipo}</label>
                <select id="bb-tipo" class="form-control bb-input">
                    <option value="">Selecione...</option>
                    <option value="E">Entrada</option>
                    <option value="S">Saida</option>
                </select>
            </div>
            <div class="bb-field" style="grid-column: span 3;">
                <label class="bb-label">{$label_categoria}</label>
                <input id="bb-categoria" type="text" class="form-control bb-input" placeholder="Categoria">
            </div>
            <div class="bb-field" style="grid-column: span 2;">
                <label class="bb-label">{$label_valor}</label>
                <input id="bb-valor" type="text" inputmode="decimal" class="form-control bb-input" placeholder="0,00">
            </div>
            <div class="bb-field" style="grid-column: span 12;">
                <label class="bb-label">{$label_descricao}</label>
                <input id="bb-descricao" type="text" class="form-control bb-input" placeholder="Descricao">
            </div>
        </div>

        <div class="bb-actions mt-3">
            <button type="button" id="bb-btn-clear" class="btn bb-btn bb-btn-outline">
                <i class="fa fa-eraser"></i> {$btn_clear}
            </button>
            <button type="button" id="bb-btn-save" class="btn bb-btn bb-btn-primary">
                <i class="fa fa-save"></i> {$btn_save}
            </button>
        </div>

        <div class="bb-table-toolbar">
            <div class="bb-filter">
                <div class="bb-field">
                    <label class="bb-label">Data inicial</label>
                    <input id="bb-filter-data-inicio" type="date" class="form-control bb-input">
                </div>
                <div class="bb-field">
                    <label class="bb-label">Data final</label>
                    <input id="bb-filter-data-fim" type="date" class="form-control bb-input">
                </div>
                <div class="bb-field">
                    <label class="bb-label">{$label_tipo}</label>
                    <select id="bb-filter-tipo" class="form-control bb-input">
                        <option value="">Todos</option>
                        <option value="E">Entrada</option>
                        <option value="S">Saida</option>
                    </select>
                </div>
                <button type="button" id="bb-filter-apply" class="btn bb-btn bb-btn-outline">
                    <i class="fa fa-filter"></i> Filtrar
                </button>
            </div>
            <div class="bb-pagination">
                <button type="button" id="bb-page-prev" class="btn bb-page-btn">Anterior</button>
                <span id="bb-page-info" class="bb-page-info">Pagina 1 de 1</span>
                <button type="button" id="bb-page-next" class="btn bb-page-btn">Proxima</button>
            </div>
        </div>

        <div class="bb-table-wrap">
            <div class="table-responsive">
                <table class="table table-sm table-hover bb-table mb-0">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Tipo</th>
                            <th>Descricao</th>
                            <th>Categoria</th>
                            <th class="text-center">Valor</th>
                            <th class="text-center">Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="bb-tbody">
                        <tr>
                            <td colspan="6" class="text-muted">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    (function () {
        const CaixaUI = {
            state: { rows: [], page: 1, perPage: 12, total: 0 },

            init: function () {
                this.bind();
                this.initFilters();
                this.loadState();
            },

            el: function (id) { return document.getElementById(id); },

            bind: function () {
                this.el('bb-btn-save').addEventListener('click', () => this.upsert());
                this.el('bb-btn-clear').addEventListener('click', () => this.resetForm());
                this.el('bb-filter-apply').addEventListener('click', () => {
                    this.state.page = 1;
                    this.loadState();
                });
                this.el('bb-page-prev').addEventListener('click', () => {
                    if (this.state.page > 1) {
                        this.state.page -= 1;
                        this.loadState();
                    }
                });
                this.el('bb-page-next').addEventListener('click', () => {
                    const totalPages = this.getTotalPages();
                    if (this.state.page < totalPages) {
                        this.state.page += 1;
                        this.loadState();
                    }
                });
                this.el('bb-tbody').addEventListener('click', (e) => {
                    const trigger = e.target.closest('[data-act]');
                    if (!trigger) return;
                    const act = trigger.getAttribute('data-act');
                    const id = trigger.getAttribute('data-id');
                    if (act === 'edit') this.edit(id);
                    if (act === 'delete') this.remove(id);
                });

                const valor = this.el('bb-valor');
                valor.addEventListener('input', () => {
                    valor.value = this.sanitizeMoney(valor.value);
                });
                valor.addEventListener('blur', () => {
                    valor.value = this.formatMoney(valor.value);
                });
            },

            initFilters: function () {
                const now = new Date();
                const isoDate = now.toISOString().slice(0, 10);
                const isoDateTime = now.toISOString().slice(0, 16);
                const ini = this.el('bb-filter-data-inicio');
                const fim = this.el('bb-filter-data-fim');
                if (ini && !ini.value) ini.value = isoDate;
                if (fim && !fim.value) fim.value = isoDate;
                if (!this.el('bb-data').value) this.el('bb-data').value = isoDateTime;
            },

            callJson: function (action, onSuccess, onError) {
                if (typeof __adianti_ajax_exec !== 'function') {
                    if (onError) onError(new Error('__adianti_ajax_exec indisponivel'), null);
                    return;
                }

                __adianti_ajax_exec(action, (result) => {
                    let data;
                    try {
                        if (typeof result === 'string') {
                            const trimmed = result.trim();
                            if (trimmed.charAt(0) === '<') {
                                if (onError) onError(new Error('HTML misturado no retorno'), result);
                                return;
                            }
                            data = JSON.parse(trimmed);
                        } else {
                            data = result;
                        }
                    } catch (e) {
                        if (onError) onError(e, result);
                        return;
                    }
                    if (onSuccess) onSuccess(data);
                }, false);
            },

            toast: function (type, message, place, icon) {
                if (typeof __adianti_show_toast === 'function') {
                    __adianti_show_toast(type, message, place || 'topRight', icon);
                }
            },

            sanitizeMoney: function (value) {
                const cleaned = String(value || '')
                    .replace(/\s/g, '')
                    .replace(/\./g, ',')
                    .replace(/[^\d,]/g, '');
                if (cleaned === '') return '';
                const hasComma = cleaned.includes(',');
                const parts = cleaned.split(',');
                const integer = parts.shift() || '';
                const decimal = (parts.join('') || '').slice(0, 2);
                if (hasComma && decimal.length === 0)
                {
                    return `${integer || '0'},`;
                }
                if (hasComma)
                {
                    return `${integer || '0'},${decimal}`;
                }
                return integer;
            },

            formatMoney: function (value) {
                const normalized = this.sanitizeMoney(value);
                if (normalized === '') return '';
                const number = Number(normalized.replace(',', '.'));
                if (Number.isNaN(number)) return '';
                return number.toFixed(2).replace('.', ',');
            },

            toPayloadMoney: function (value) {
                const normalized = this.sanitizeMoney(value);
                if (normalized === '') return '';
                const trimmed = normalized.endsWith(',') ? normalized.slice(0, -1) : normalized;
                return trimmed.replace(',', '.');
            },

            getListParams: function () {
                const params = new URLSearchParams();
                params.set('page', this.state.page);
                params.set('per_page', this.state.perPage);
                const dataInicio = this.el('bb-filter-data-inicio').value || '';
                const dataFim = this.el('bb-filter-data-fim').value || '';
                const tipo = this.el('bb-filter-tipo').value || '';
                if (dataInicio) params.set('data_inicio_list', dataInicio);
                if (dataFim) params.set('data_fim_list', dataFim);
                if (tipo) params.set('tipo_list', tipo);
                return params;
            },

            loadState: function () {
                const dataInicio = this.el('bb-filter-data-inicio').value || '';
                const dataFim = this.el('bb-filter-data-fim').value || '';
                if (!dataInicio || !dataFim) {
                    this.toast('warning', 'Informe a data inicial e final.');
                    return;
                }
                const params = this.getListParams();
                const action = 'class=MovimentoCaixaCustomForm&method=onGetState&' + params.toString();
                this.callJson(action, (resp) => {
                    if (resp && resp.error) {
                        this.toast('error', resp.message || 'Erro ao carregar.');
                        return;
                    }
                    this.state.rows = resp.rows || [];
                    this.state.total = Number(resp.total || 0);
                    this.state.page = Number(resp.page || this.state.page || 1);
                    this.state.perPage = Number(resp.per_page || this.state.perPage || 12);
                    this.renderRows();
                    this.renderPagination();
                });
            },

            renderRows: function () {
                const tbody = this.el('bb-tbody');
                tbody.innerHTML = '';

                if (!this.state.rows.length) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = '<td colspan="6" class="text-muted">Nenhum movimento encontrado.</td>';
                    tbody.appendChild(tr);
                    return;
                }

                this.state.rows.forEach(row => {
                    const tr = document.createElement('tr');
                    const valor = this.formatMoney(Number(row.valor || 0).toFixed(2));
                    const badge = row.tipo === 'E'
                        ? '<span class="bb-badge bb-badge-in">Entrada</span>'
                        : '<span class="bb-badge bb-badge-out">Saida</span>';
                    tr.innerHTML = `
                        <td>${row.data_formatada || row.data_movimento}</td>
                        <td>${badge}</td>
                        <td>${row.descricao || '-'}</td>
                        <td>${row.categoria || '-'}</td>
                        <td class="text-center">R$ ${valor}</td>
                        <td class="text-center">
                            <button type="button" class="btn btn-sm bb-btn bb-btn-outline" data-act="edit" data-id="${row.id}">
                                <i class="fa fa-edit"></i> Editar
                            </button>
                            <button type="button" class="btn btn-sm bb-btn bb-btn-outline" data-act="delete" data-id="${row.id}">
                                <i class="fa fa-trash"></i> Remover
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            },

            renderPagination: function () {
                const totalPages = this.getTotalPages();
                const info = this.el('bb-page-info');
                info.textContent = `Pagina ${this.state.page} de ${totalPages}`;
                this.el('bb-page-prev').disabled = this.state.page <= 1;
                this.el('bb-page-next').disabled = this.state.page >= totalPages;
            },

            getTotalPages: function () {
                return Math.max(1, Math.ceil(this.state.total / this.state.perPage));
            },

            resetForm: function () {
                this.el('bb-id').value = '';
                this.el('bb-descricao').value = '';
                this.el('bb-valor').value = '';
                this.el('bb-categoria').value = '';
                this.el('bb-tipo').value = '';
                const now = new Date().toISOString().slice(0, 16);
                this.el('bb-data').value = now;
            },

            edit: function (id) {
                const row = this.state.rows.find(item => String(item.id) === String(id));
                if (!row) return;
                this.el('bb-id').value = row.id;
                this.el('bb-data').value = this.toDatetimeLocal(row.data_movimento || '');
                this.el('bb-tipo').value = row.tipo || '';
                this.el('bb-descricao').value = row.descricao || '';
                this.el('bb-valor').value = this.formatMoney(Number(row.valor || 0).toFixed(2));
                this.el('bb-categoria').value = row.categoria || '';
            },

            upsert: function () {
                const payload = {
                    id: this.el('bb-id').value || '',
                    data_movimento: this.el('bb-data').value || '',
                    tipo: this.el('bb-tipo').value || '',
                    descricao: this.el('bb-descricao').value || '',
                    valor: this.toPayloadMoney(this.el('bb-valor').value || ''),
                    categoria: this.el('bb-categoria').value || ''
                };

                const action = 'class=MovimentoCaixaCustomForm&method=onUpsert&payload_json=' + encodeURIComponent(JSON.stringify(payload));
                this.callJson(action, (resp) => {
                    if (resp && resp.error) {
                        this.toast('error', resp.message || 'Erro ao salvar.');
                        return;
                    }
                    this.toast('success', resp.message || 'Salvo.');
                    this.resetForm();
                    this.loadState();
                });
            },

            remove: function (id) {
                if (!confirm('Remover este movimento?')) {
                    return;
                }
                const action = 'class=MovimentoCaixaCustomForm&method=onDelete&id=' + encodeURIComponent(id);
                this.callJson(action, (resp) => {
                    if (resp && resp.error) {
                        this.toast('error', resp.message || 'Erro ao remover.');
                        return;
                    }
                    this.toast('success', resp.message || 'Removido.');
                    this.resetForm();
                    this.loadState();
                });
            }
            ,
            toDatetimeLocal: function (value) {
                const raw = String(value || '').trim();
                if (raw === '') return '';
                const parts = raw.split(' ');
                const datePart = parts[0] || '';
                const timePart = parts[1] || '00:00:00';
                if (datePart.includes('-')) {
                    return datePart + 'T' + timePart.substring(0, 5);
                }
                const parsed = new Date(raw);
                if (Number.isNaN(parsed.getTime())) return '';
                return parsed.toISOString().slice(0, 16);
            }
        };

        CaixaUI.init();
    })();
</script>
<!--[/main]-->
